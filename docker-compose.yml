# All-in-one Hetzner VM: FastAPI scraper + Streamlit + nginx (TLS).
# Streamlit talks to the API on the Docker network (no Cloud→public-IP timeouts).
#
# First time on Ubuntu:
#   bash setup.sh
# Edit .env (SCRAPER_API_KEY), then:
#   bash setup.sh
#
# URLs:
#   https://<VM_IP>/           → Streamlit
#   https://<VM_IP>/api/health → FastAPI (strip /api prefix upstream)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      # Small VM: SCRAPER_CONSERVATIVE=1 caps grid + Playwright concurrency.
      # Outbound proxy: SCRAPER_HTTP_PROXY=... OR Scrape.do: SCRAPE_DO_TOKEN=... in .env (see scrape_network.py).
      # Verify after deploy: GET /api/health/scrape-config → outbound_proxy_configured, outbound_proxy_source.
      SCRAPER_VENDOR_PAGE_ENRICH: "1"
      GEOAPIFY_API_KEY: "61a2a04d1407438aa8dbfed2df839547"
      # Small-VM defaults: heavy Playwright + 150 samples OOMs; .env can raise caps on bigger workers.
      MAX_SCRAPE_SAMPLE_POINTS: "20"
      SCRAPER_HIGH_VOLUME: "0"
      SCRAPER_HTTP_LISTING_PAGES: "25"
      SCRAPER_HTTP_LISTING_MAX_PATHS: "1500"
      SCRAPER_PLAYWRIGHT_LISTING_SEED: "0"
      SCRAPER_PLAYWRIGHT_SEED_URLS: "12"
      SCRAPER_LISTING_PAGE_PAGINATION: "1"
      SCRAPER_LISTING_MAX_PAGES: "40"
      SCRAPER_LISTING_SCROLL_ROUNDS: "35"
      SCRAPER_AGGRESSIVE_LISTING: "1"
      SCRAPER_MIN_GRID_POINTS: "20"
      SCRAPER_HIGH_VOLUME_MIN_SAMPLES: "20"
      SCRAPER_PLAYWRIGHT_CONCURRENCY: "1"
      RESTAURANT_DETAIL_ENRICH_MAX: "400"
    env_file:
      - .env
    volumes:
      - ./data/scrape_jobs:/app/data/scrape_jobs
      - ./analyze_jobs:/app/analyze_jobs
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=8).read()",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    networks:
      - intel

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: unless-stopped
    environment:
      # Reachable only inside this Compose network. If UI shows connection refused while polling /result/..., check api logs — the worker may have crashed after enqueue.
      API_BASE_URL: http://api:8000
      # Shown in the UI “Build:” banner; override in .env e.g. APP_BUILD_STAMP=$(git rev-parse --short HEAD)
      APP_BUILD_STAMP: ${APP_BUILD_STAMP:-2026-05-03-vm-docker-compose}
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ENABLE_CORS: "false"
      STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION: "false"
    env_file:
      - .env
    expose:
      - "8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - intel

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx.optional_site_auth.conf:/etc/nginx/snippets/optional_site_auth.conf:ro
      # Optional UI/API browser password (after creating deploy/.htpasswd — see that file’s header):
      # - ./deploy/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - streamlit
      - api
    networks:
      - intel

networks:
  intel:
    driver: bridge
