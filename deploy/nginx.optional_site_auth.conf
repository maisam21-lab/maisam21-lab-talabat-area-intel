# Optional: password-protect the whole site (Streamlit + /api in the browser).
#
# Enable:
#  1) docker run --rm httpd:2.4-alpine htpasswd -nbB 'youruser' 'yourstrongpass' > deploy/.htpasswd
#  2) DELETE the line "auth_basic off;" below, then uncomment the two auth_basic lines.
#  3) In docker-compose.yml nginx volumes, add:  - ./deploy/.htpasswd:/etc/nginx/.htpasswd:ro
#  4) docker compose -f docker-compose.yml up -d --force-recreate nginx
#
# Streamlit still sends SCRAPER_API_KEY to the API; this only gates HTTPS in the browser.

auth_basic off;

# auth_basic "Area Intel";
# auth_basic_user_file /etc/nginx/.htpasswd;
