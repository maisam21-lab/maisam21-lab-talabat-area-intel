# Talabat Area Intel — API tuned for a dedicated worker (clean egress, not a noisy shared datacenter IP).
# On the VPS:
#   bash scripts/bootstrap_worker_env.sh   # creates env.worker.local from env.worker.example
#   nano env.worker.local                    # set SCRAPER_API_KEY, GOOGLE_MAPS_API_KEY, …
#   bash scripts/run_worker_docker.sh
#
# TLS: put Caddy/nginx on 443 → 127.0.0.1:8000 (see deploy/Caddyfile.example) and change ports to "127.0.0.1:8000:8000".
# Full steps: DEPLOY_VPS_WORKER.md

services:
  talabat-scraper-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: talabat-area-intel-scraper:worker
    restart: unless-stopped
    shm_size: "1gb"
    ports:
      - "8000:8000"
    env_file:
      - env.worker.local
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=6).read()",
        ]
      interval: 30s
      timeout: 12s
      retries: 5
      start_period: 120s
